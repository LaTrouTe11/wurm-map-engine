# WurmMapGen Configuration
# Ce fichier doit être placé à la racine de votre dépôt wurm-map-engine

# --- Chemins des données ---
# Dossier contenant vos bases de données SQLite (.db)
sqliteDir=./sqlite

# Dossier où seront générées les images (tuiles) de la carte
outputDir=./tiles

# --- Paramètres du serveur ---
# Doit correspondre exactement au dossier de vos données
serverName=Doriath-4k-20

# --- Options de rendu ---
renderMarkers=true
renderPlayers=true
renderCaves=false

# --- Configuration de la carte ---
# Zoom max (5 ou 6 est recommandé pour la performance)
maxZoom=5

# --- Paramètres techniques (Ne pas modifier sauf besoin) ---
# Active le mode headless pour le déploiement GitHub Actions
headless=true
