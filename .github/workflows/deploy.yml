# WurmMapGen Configuration - Version corrigée
# Ce fichier doit être nommé WurmMapGen.properties

# --- Chemins ---
# Le dossier sqlite doit être à la racine
sqliteDir=./sqlite
# Le dossier output doit être à la racine
outputDir=./tiles
# Définit la racine comme dossier de template pour éviter l'erreur de répertoire
templateDir=.

# --- Paramètres du serveur ---
# Vérifiez que ce nom correspond exactement au dossier de vos bases de données
serverName=Doriath-4k-20

# --- Options de rendu ---
renderMarkers=true
renderPlayers=true
renderCaves=false

# --- Configuration de la carte ---
maxZoom=5

# --- Technique ---
headless=true
