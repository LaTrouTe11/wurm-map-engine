name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Générateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis et des Polices
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre fontconfig

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Generation des 256 Images du Terrain
        run: |
          cat << 'EOF' > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=./output_tiles
          dbDir=./sqlite
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          actualMapSize=4096
          mapTileSize=256
          mapMaxZoom=5
          mapMinZoom=0
          nativeZoom=5
          markerType=2
          enableRealtimeMarkers=true
          usePHP=false
          rmiHost=${{ secrets.LEGION_HOST }}
          rmiPort=5606
          rmiPassword=${{ secrets.RMI_PASSWORD }}
          EOF

          mkdir -p output_tiles/images output_tiles/data
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          
          chmod +x WurmMapGen.jar
          java -Djava.awt.headless=true -jar WurmMapGen.jar

      - name: 5. Extraction et Assemblage du Pack Racine Absolu 2026
        run: |
          mkdir -p /tmp/site_propre/images /tmp/site_propre/data /tmp/site_propre/app /tmp/site_propre/css /tmp/site_propre/markers /tmp/site_propre/dist /tmp/site_propre/includes
          
          # 1. Extraction et aspiration de TOUS les répertoires d'interface générés en cache par l'application
          if [ -d "template" ]; then
            cp -rf template/* /tmp/site_propre/
          fi

          # 2. Rapatriement forcé des sous-dossiers systèmes WurmMapGen s'ils ont été créés à la racine
          cp -rf app/ css/ markers/ dist/ includes/ /tmp/site_propre/ 2>/dev/null || true
          
          # 3. Rapatriement et remontée des tuiles géographiques PNG et JSON
          if [ -d "output_tiles/images/5" ]; then cp -rf output_tiles/images/5/*.png /tmp/site_propre/images/ 2>/dev/null || true; fi
          if [ -d "output_tiles/images" ]; then cp -rf output_tiles/images/*.png /tmp/site_propre/images/ 2>/dev/null || true; fi
          if [ -d "output_tiles/data" ]; then cp -rf output_tiles/data/*.json /tmp/site_propre/data/ 2>/dev/null || true; fi
          cp -f *.png /tmp/site_propre/images/ 2>/dev/null || true
          cp -f *.json /tmp/site_propre/data/ 2>/dev/null || true

          # 4. Écriture forcée du fichier de configuration requis par main.js pour débloquer l'affichage
          cat << 'EOF' > /tmp/site_propre/data/config.json
          {
            "serverName": "[QC/FR/CAN] QBC Doriath",
            "actualMapSize": 4096,
            "mapTileSize": 256,
            "mapMaxZoom": 5,
            "mapMinZoom": 0,
            "nativeZoom": 5,
            "markerType": 2,
            "enableRealtimeMarkers": true,
            "showPlayers": true,
            "showDeeds": true,
            "showGuardTowers": true,
            "showPortals": true,
            "showStructures": true
          }
          EOF

      - name: 6. Ouverture automatique du Depot 1 via Action Officielle
        uses: actions/checkout@v4
        with:
          repository: 'LaTrouTe11/wurm-livemap-doriath'
          token: ${{ secrets.MY_DEPLOY_TOKEN }}
          path: 'espace_depot1'

      - name: 7. Deploiement de l Arborescence Miroir Totale vers Depot 1
        run: |
          mkdir -p espace_depot1/images espace_depot1/data espace_depot1/app espace_depot1/css espace_depot1/markers espace_depot1/dist espace_depot1/includes
          
          # Copie miroir complète de l'ensemble de l'écosystème graphique
          cp -rf /tmp/site_propre/* espace_depot1/
          
          # Correction textuelle à la volée du gabarit HTML s'il existe pour boucher les trous de rendu
          if [ -f "espace_depot1/index.html" ]; then
            sed -i 's/{{serverName}}/[QC\/FR\/CAN] QBC Doriath/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show deeds/Afficher les villages/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show guard towers/Afficher les tours de garde/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show players/Afficher les joueurs/g' espace_depot1/index.html 2>/dev/null || true
          fi
          
          cd espace_depot1
          git config user.name "Robot Coordinateur Wurm"
          git config user.email "action@github.com"
          git add -A .
          git commit -m "Console QBC 2026 : Injection complète de tous les dossiers racines système" || echo "Déjà à jour"
          git push origin main --force || git push origin master --force








