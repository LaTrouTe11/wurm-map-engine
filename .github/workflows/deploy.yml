name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Création des structures de dossiers requises
      - name: Create local directories
        run: mkdir -p sqlite_db/sqlite

      # Téléchargement automatique de la liste complète des fichiers requis
      - name: Scan and Download Map Files via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            async function findFile(dir, targetName) {
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {}
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                
                const mapPath = await findFile('.', 'top_layer.map');
                if (mapPath) { await sftp.fastGet(mapPath, './sqlite_db/top_layer.map'); }
                
                const zonesPath = await findFile('.', 'wurmzones.db');
                if (zonesPath) { await sftp.fastGet(zonesPath, './sqlite_db/sqlite/wurmzones.db'); }

                const itemsPath = await findFile('.', 'wurmitems.db');
                if (itemsPath) { await sftp.fastGet(itemsPath, './sqlite_db/sqlite/wurmitems.db'); }

                const playersPath = await findFile('.', 'wurmplayers.db');
                if (playersPath) { await sftp.fastGet(playersPath, './sqlite_db/sqlite/wurmplayers.db'); }
                
                console.log('Téléchargements réussis.');
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # Alignement structurel complet
      - name: Align files structure
        run: |
          cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map
          cp ./sqlite_db/sqlite/wurmzones.db ./sqlite_db/wurmzones.db
          cp ./sqlite_db/sqlite/wurmitems.db ./sqlite_db/wurmitems.db
          cp ./sqlite_db/sqlite/wurmplayers.db ./sqlite_db/wurmplayers.db
          echo "Structure de données alignée."

      # Compilation de la carte (Génère uniquement les tuiles d'images)
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar || true

      # Duplication brute et propre de votre template vers la racine
      - name: Build Clean Index from Template
        run: |
          cp template/index.html ./index.html
          echo "Index cloné avec succès : $(wc -c < ./index.html) octets."

      # CORRECTIF : Sauvegarde globale et sécurisée des images et de l'index sur votre historique GitHub
      - name: Pousser les fichiers corriges sur GitHub
        run: |
          git config --local user.name "Doriath-Map-Bot"
          git config --local user.email "actions@github.com"
          
          # Ajoute l'index, les fichiers de données des deeds et toutes les images du relief générées
          git add index.html data/*.json images/*.png app/map.js
          
          # Effectue la sauvegarde uniquement s'il y a des changements réels détectés
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Mise a jour automatique WurmMapGen v2.33 [skip ci]"
            git push origin main
            echo "Succès : L'index et les images ont été sauvegardés sur votre dépôt !"
          else
            echo "Aucune modification détectée."
          fi

      # Préparation de l'envoi vers le site web
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Déploiement final en ligne
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4









