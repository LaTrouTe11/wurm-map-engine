
name: Deploy Wurm Map

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement
        run: |
          mkdir -p WurmGenMap/sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /home/container/dist/Doriath-4k-20/sqlite/ || cd dist/Doriath-4k-20/sqlite/; \
                   mget -O WurmGenMap/sqlite/ wurmplayers.db wurm.db; \
                   cd ../; \
                   get -O WurmGenMap/ top_layer.map; \
                   bye"

      - name: 4. Generation
        run: |
          # 1. Copie du fichier de config à la racine pour le programme
          cp WurmGenMap/WurmMapGen.properties .
          
          # 2. Lancement du générateur
          java -Djava.awt.headless=true -Xmx5g -jar WurmGenMap/WurmMapGen.jar
          
          # 3. Déplacement des tuiles vers template/tiles
          mkdir -p template/tiles
          find . -maxdepth 1 \( -name "*.png" -o -name "*.json" \) -exec mv {} template/tiles/ \; || echo "Aucune tuile"
          
          # 4. Copie de la config générée (pour le bug TypeError)
          if [ -f config.json ]; then
            cp config.json template/data/config.json
          fi
          
          # 5. Nettoyage
          rm -f WurmMapGen.properties
          rm -f top_layer.map

      - name: 5. Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './template'

      - name: 6. Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
