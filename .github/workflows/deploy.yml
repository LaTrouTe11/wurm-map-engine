
name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Générateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis et des Polices
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre fontconfig

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Generation des 256 Images du Terrain
        run: |
          cat << 'EOF' > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=./output_tiles
          dbDir=./sqlite
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          actualMapSize=4096
          mapTileSize=256
          mapMaxZoom=5
          mapMinZoom=0
          nativeZoom=5
          markerType=2
          enableRealtimeMarkers=true
          usePHP=false
          rmiHost=${{ secrets.LEGION_HOST }}
          rmiPort=5606
          rmiPassword=${{ secrets.RMI_PASSWORD }}
          EOF

          mkdir -p output_tiles/images output_tiles/data
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          
          cat << 'EOF' > template/index.html
          <!DOCTYPE html>
          <html><head><title>WurmMapGen</title></head><body></body></html>
          EOF
          
          chmod +x WurmMapGen.jar
          java -Djava.awt.headless=true -jar WurmMapGen.jar

      - name: 6. Ouverture securisee du Depot 1 (Site Web d'affichage)
        uses: actions/checkout@v4
        with:
          repository: 'LaTrouTe11/wurm-livemap-doriath'
          token: ${{ secrets.MY_DEPLOY_TOKEN }}
          path: 'espace_depot1'

      - name: 7. Assemblage et Deploiement de l'Arborescence Root Absolute
        run: |
          # 1. On s'assure que les sous-dossiers existent sur le site web
          mkdir -p espace_depot1/images espace_depot1/data espace_depot1/app espace_depot1/css espace_depot1/markers espace_depot1/dist espace_depot1/includes
          
          # 2. Rapatriement forcé de TOUTES les dalles de terrain PNG générées
          if [ -d "output_tiles/images/5" ]; then cp -rf output_tiles/images/5/*.png espace_depot1/images/ 2>/dev/null || true; fi
          if [ -d "output_tiles/images" ]; then cp -rf output_tiles/images/*.png espace_depot1/images/ 2>/dev/null || true; fi
          if [ -d "template/images" ]; then cp -rf template/images/*.png espace_depot1/images/ 2>/dev/null || true; fi
          cp -f *.png espace_depot1/images/ 2>/dev/null || true
          
          # 3. Rapatriement forcé des marqueurs de villages JSON
          if [ -d "output_tiles/data" ]; then cp -rf output_tiles/data/*.json espace_depot1/data/ 2>/dev/null || true; fi
          if [ -d "template/data" ]; then cp -rf template/data/*.json espace_depot1/data/ 2>/dev/null || true; fi
          cp -f *.json espace_depot1/data/ 2>/dev/null || true

          # 4. FIX DE LA LIGNE 68 : Écriture forcée du fichier config.json requis par main.js
          cat << 'EOF' > espace_depot1/data/config.json
          {
            "serverName": "[QC/FR/CAN] QBC Doriath",
            "actualMapSize": 4096,
            "mapTileSize": 256,
            "mapMaxZoom": 5,
            "mapMinZoom": 0,
            "nativeZoom": 5,
            "markerType": 2,
            "enableRealtimeMarkers": true,
            "showPlayers": true,
            "showDeeds": true,
            "showGuardTowers": true,
            "showPortals": true,
            "showStructures": true
          }
          EOF

          # 5. Réparation et francisation automatique de l'index d'origine s'il existe
          if [ -f "espace_depot1/index.html" ]; then
            sed -i 's/map.unproject(\[,\s*\]/map.unproject(\[0,0\]/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/{{serverName}}/[QC\/FR\/CAN] QBC Doriath/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show deeds/Afficher les villages/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show guard towers/Afficher les tours de garde/g' espace_depot1/index.html 2>/dev/null || true
            sed -i 's/Show players/Afficher les joueurs/g' espace_depot1/index.html 2>/dev/null || true
          fi

          # 6. Envoi de l'ensemble du pack mis à jour vers GitHub
          cd espace_depot1
          git config user.name "Robot Coordinateur Wurm"
          git config user.email "action@github.com"
          git add -A .
          git commit -m "Console QBC 2026 : Résolution du TypeError de la ligne 68" || echo "Déjà à jour"
          git push origin main --force || git push origin master --force






