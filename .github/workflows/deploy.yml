- name: Download Data via SFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass
          
          # Connexion et téléchargement en chemin relatif
          sshpass -p "${{ secrets.LEGION_PASS }}" sftp -o StrictHostKeyChecking=no -P ${{ secrets.LEGION_PORT }} ${{ secrets.LEGION_USER }}@${{ secrets.LEGION_HOST }} <<EOF
          cd dist/Doriath-4k-20/sqlite
          get wurmplayers.db
          get wurm.db
          bye
          EOF
