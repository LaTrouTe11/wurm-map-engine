name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Generateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Execution du Generateur Java WurmMapGen
        run: |
          if [ -f "WurmMapGen.properties" ]; then
            sed -i '/rmiPassword/d' WurmMapGen.properties
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSWORD }}" >> WurmMapGen.properties
          fi

          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar

      - name: 5. Connexion Securisee et Push vers le Depot 1 (Site Web)
        env:
          CLE_SECRET: ${{ secrets.MY_DEPLOY_TOKEN }}
        run: |
          git config --global user.name "Robot Coordinateur Wurm"
          git config --global user.email "action@github.com"
          
          # FIX: Utilisation d'une variable d'environnement pour bloquer les coupures de l'IA sur l'URL
          git clone "https://${CLE_SECRET}@://github.com" /tmp/depot_web
          
          mkdir -p /tmp/depot_web/images /tmp/depot_web/data
          if [ -d "images" ]; then cp -rf images/*.png /tmp/depot_web/images/ 2>/dev/null || true; fi
          if [ -d "data" ]; then cp -rf data/*.json /tmp/depot_web/data/ 2>/dev/null || true; fi
          
          cd /tmp/depot_web
          git add images/ data/
          git diff-index --quiet HEAD || git commit -m "MAJ auto : synchronisation des donnees depuis le depot generateur"
          git push origin main || true
          rm -rf /tmp/depot_web

