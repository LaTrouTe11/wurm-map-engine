name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Generateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Execution du Generateur Java WurmMapGen
        run: |
          if [ -f "WurmMapGen.properties" ]; then
            sed -i '/rmiPassword/d' WurmMapGen.properties
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSWORD }}" >> WurmMapGen.properties
          fi

          # Création de la structure pour recevoir les rendus Java
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          java -Djava.awt.headless=true -Xmx5g -jar WurmMapGen.jar

      - name: 5. Synchronisation Directe des Images par API
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.MY_DEPLOY_TOKEN }}
        with:
          # FIX : On cible le dossier exact où Java extrait les images du terrain
          source-directory: 'template/images'
          destination-repository-username: 'latroute11'
          destination-repository-name: 'wurm-livemap-doriath'
          target-branch: 'main'
          target-directory: 'images'
          user-email: 'action@github.com'
          user-name: 'Robot Coordinateur Wurm'
          commit-message: 'MAJ auto : synchronisation des tuiles de terrain depuis le generateur'

      - name: 6. Synchronisation des Donnees JSON par API
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.MY_DEPLOY_TOKEN }}
        with:
          # FIX : On cible le dossier exact où Java écrit les fichiers de marqueurs
          source-directory: 'template/data'
          destination-repository-username: 'latroute11'
          destination-repository-name: 'wurm-livemap-doriath'
          target-branch: 'main'
          target-directory: 'data'
          user-email: 'action@github.com'
          user-name: 'Robot Coordinateur Wurm'
          commit-message: 'MAJ auto : synchronisation des marqueurs JSON depuis le generateur'

