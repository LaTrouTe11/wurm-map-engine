name: Deploy Wurm Map

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Installation
        run: sudo apt-get update && sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement
        run: |
          mkdir -p WurmGenMap/sqlite
          lftp -u "${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }}" sftp://${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }} <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set xfer:clobber on
          # On essaie d'abord le chemin absolu complet, sinon le chemin relatif
          cd /home/container/dist/Doriath-4k-20/sqlite/ || cd dist/Doriath-4k-20/sqlite/
          mget -O WurmGenMap/sqlite/ wurmplayers.db wurm.db
          # Téléchargement du fichier de mapping (on remonte d'un dossier)
          cd ../
          get -O WurmGenMap/ top_layer.map
          bye
          EOF

      - name: 4. Generation
        run: |
          # Copie de la config et lancement du générateur
          cp WurmGenMap/WurmMapGen.properties .
          java -Djava.awt.headless=true -Xmx5g -jar WurmGenMap/WurmMapGen.jar
          
          # Préparation des tuiles
          mkdir -p template/tiles
          find . -maxdepth 1 \( -name "*.png" -o -name "*.json" \) -exec mv {} template/tiles/ \; || echo "Aucune tuile"
          
          # Copie de la config générée si présente
          if [ -f config.json ]; then
            cp config.json template/data/config.json
          fi
          
          # Nettoyage
          rm -f WurmMapGen.properties top_layer.map

      - name: 5. Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './template'

      - name: 6. Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
