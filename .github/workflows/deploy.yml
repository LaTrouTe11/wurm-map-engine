name: "Mise a jour Carte Doriath"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 1. Création des structures de dossiers requises pour les bases SQLite
      - name: Create local directories
        run: mkdir -p sqlite_db/sqlite

      # 2. Téléchargement automatique et scan sécurisé de la liste complète des fichiers requis
      - name: Scan and Download Map Files via Node SFTP
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const execSync = require('child_process').execSync;
            execSync('npm install ssh2-sftp-client');
            const Client = require('ssh2-sftp-client');
            const sftp = new Client();
            
            const config = {
              host: '${{ secrets.LEGION_HOST }}',
              port: parseInt('${{ secrets.LEGION_PORT }}' || '22'),
              username: '${{ secrets.LEGION_USER }}',
              password: '${{ secrets.LEGION_PASS }}'
            };
            
            async function findFile(dir, targetName) {
              let list = await sftp.list(dir);
              for (const item of list) {
                const fullPath = dir === '/' ? `/${item.name}` : `${dir}/${item.name}`;
                if (item.type === '-') {
                  if (item.name.toLowerCase() === targetName.toLowerCase()) {
                    return fullPath;
                  }
                } else if (item.type === 'd' && item.name !== '.' && item.name !== '..') {
                  try {
                    const found = await findFile(fullPath, targetName);
                    if (found) return found;
                  } catch (e) {}
                }
              }
              return null;
            }
            
            async function main() {
              try {
                console.log('Connexion à Legion Hosting...');
                await sftp.connect(config);
                
                const mapPath = await findFile('.', 'top_layer.map');
                if (mapPath) { await sftp.fastGet(mapPath, './sqlite_db/top_layer.map'); }
                
                const zonesPath = await findFile('.', 'wurmzones.db');
                if (zonesPath) { await sftp.fastGet(zonesPath, './sqlite_db/sqlite/wurmzones.db'); }

                const itemsPath = await findFile('.', 'wurmitems.db');
                if (itemsPath) { await sftp.fastGet(itemsPath, './sqlite_db/sqlite/wurmitems.db'); }

                const playersPath = await findFile('.', 'wurmplayers.db');
                if (playersPath) { await sftp.fastGet(playersPath, './sqlite_db/sqlite/wurmplayers.db'); }
                
                console.log('Téléchargements réussis.');
              } catch (err) {
                console.error('Erreur critique:', err.message);
                process.exit(1);
              } finally {
                await sftp.end();
              }
            }
            
            return main();

      # 3. Alignement structurel complet pour satisfaire l'outil Java
      - name: Align files structure
        run: |
          cp ./sqlite_db/top_layer.map ./sqlite_db/sqlite/top_layer.map
          cp ./sqlite_db/sqlite/wurmzones.db ./wurmzones.db
          cp ./sqlite_db/sqlite/wurmitems.db ./wurmitems.db
          cp ./sqlite_db/sqlite/wurmplayers.db ./wurmplayers.db
          echo "Structure de données alignée."

      # 4. Compilation de la carte (Génère uniquement les tuiles d'images)
      - name: Run WurmMapGen
        run: |
          java -jar WurmMapGen.jar || true

      # 5. Duplication brute et propre de votre template d'interface vers la racine
      - name: Build Clean Index from Template
        run: |
          cp template/index.html ./index.html
          echo "Index cloné avec succès : $(wc -c < ./index.html) octets."

      # 6. NETTOYAGE CRITIQUE ANTI-BUG DE SÉCURITÉ : Supprime les faux fichiers de clés de la bibliothèque
      - name: Purge False Security Keys
        run: |
          if [ -d "node_modules/ssh2/test" ]; then
            echo "Suppression des fausses clés privées de simulation..."
            rm -rf node_modules/ssh2/test
          fi

      # 7. Sauvegarde globale et sécurisée de vos fichiers d'images de terrain réels
      - name: Pousser les fichiers corriges sur GitHub
        run: |
          git config --local user.name "Doriath-Map-Bot"
          git config --local user.email "actions@github.com"
          
          git add index.html || true
          git add app/map.js || true
          
          if [ -d "data" ]; then git add data/; fi
          if [ -d "images" ]; then git add images/; fi
          
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Mise a jour automatique complète WurmMapGen [skip ci]"
            git push origin main
            echo "Succès : L'arborescence propre a été enregistrée !"
          else
            echo "Aucune modification détectée dans les fichiers."
          fi

      # 8. Déploiement direct sur la branche d'hébergement gh-pages
      - name: Deploy to gh-pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: '.'
          branch: gh-pages







