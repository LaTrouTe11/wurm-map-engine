name: Deploy Wurm Map

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # MODIFIEZ CECI AVEC LE NOM EXACT DE VOTRE MONDE
      NOM_MONDE: "Doriath-4k-20"
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4

      - name: Download Data via SFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass
          
          # Connexion et recherche dynamique du dossier par le nom du monde
          sshpass -p "${{ secrets.LEGION_PASS }}" sftp -o StrictHostKeyChecking=no -P ${{ secrets.LEGION_PORT }} ${{ secrets.LEGION_USER }}@${{ secrets.LEGION_HOST }} <<EOF
          # On cherche le répertoire qui contient le nom de votre monde
          cd $(find /home/container -type d -name "$NOM_MONDE" | head -n 1)/sqlite
          
          # Téléchargement des bases de données
          get wurmplayers.db
          get wurm.db
          bye
          EOF

      - name: Generate Map
        run: |
          java -jar WurmMapGen.jar

      - name: Clone Site Web
        run: |
          git clone https://x-access-token:${{ secrets.MY_DEPLOY_TOKEN }}@github.com/LaTrouTe11/wurm-livemap-doriath.git

      - name: Copy Maps to Site
        run: |
          cp -r tiles/* wurm-livemap-doriath/tiles/

      - name: Push to Site Web
        run: |
          cd wurm-livemap-doriath
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Mise à jour automatique de la carte"
          git push https://x-access-token:${{ secrets.MY_DEPLOY_TOKEN }}@github.com/LaTrouTe11/wurm-livemap-doriath.git main
