name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Générateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Configuration et Execution Forcee de WurmMapGen
        run: |
          if [ -f "WurmMapGen.properties" ]; then
            sed -i '/rmiPassword/d' WurmMapGen.properties
            sed -i 's/rmiHost=.*/rmiHost=${{ secrets.LEGION_HOST }}/g' WurmMapGen.properties
            sed -i 's/rmiPort=.*/rmiPort=5606/g' WurmMapGen.properties
            sed -i 's/enableRealtimeMarkers=.*/enableRealtimeMarkers=true/g' WurmMapGen.properties
            echo "rmiPassword=${{ secrets.RMI_PASSWORD }}" >> WurmMapGen.properties
          fi

          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          chmod +x WurmMapGen.jar
          chmod -R 777 template/
          java -Djava.awt.headless=true -jar WurmMapGen.jar

      - name: 5. Creation du Pack Web Propre Complet 2026
        run: |
          mkdir -p /tmp/site_propre/images /tmp/site_propre/data
          
          # Extraction et copie des paquets de tuiles PNG et JSON
          if [ -d "template/images/5" ]; then
            cp -rf template/images/5/*.png /tmp/site_propre/images/ 2>/dev/null || true
          fi
          cp -rf template/images/*.png /tmp/site_propre/images/ 2>/dev/null || true
          cp -rf template/data/*.json /tmp/site_propre/data/ 2>/dev/null || true
          cp -f *.png /tmp/site_propre/images/ 2>/dev/null || true
          cp -f *.json /tmp/site_propre/data/ 2>/dev/null || true

          # Écriture de l index HTML stabilisé (Élimine définitivement les balises accolades orphelines)
          cat << 'EOF' > /tmp/site_propre/index.html
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
              <title>[QC/FR/CAN] QBC Doriath - LiveMap</title>
              <link rel="stylesheet" href="https://unpkg.com" />
              <script src="https://unpkg.com"></script>
              <style>
                  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a24; font-family: sans-serif; }
                  #sidebar { position: absolute; top: 0; left: 0; bottom: 0; width: 240px; background: #22222b; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 100; padding: 15px; border-right: 1px solid #3a3a4a; color: white; overflow-y: auto; }
                  #sidebar h1 { color: #2196F3; font-size: 16px; margin: 0 0 5px 0; font-weight: bold; }
                  #sidebar p { color: #888; font-size: 11px; margin: 0 0 20px 0; }
                  #map { position: absolute; top: 0; bottom: 0; right: 0; left: 240px; background-color: #15151c; z-index: 1; }
                  .filter-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
                  .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; cursor: pointer; user-select: none; }
                  .filter-item input { cursor: pointer; }
                  .indent { padding-left: 20px; color: #aaa; font-size: 12px; }
              </style>
          </head>
          <body>
              <div id="sidebar">
                  <h1>QBC Doriath</h1>
                  <p>Interactive LiveMap • Réseau stable 2026</p>
                  
                  <div style="font-size: 11px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">Contrôle de l'affichage</div>
                  
                  <div class="filter-group">
                      <label class="filter-item"><input type="checkbox" id="chk-players" checked onchange="toggleLayer('players')"> Afficher les joueurs</label>
                      <label class="filter-item"><input type="checkbox" id="chk-villages" checked onchange="toggleLayer('villages')"> Afficher les villages</label>
                      <label class="filter-item indent"><input type="checkbox" id="chk-villageBorders" checked onchange="toggleLayer('villageBorders')"> Frontières des villages</label>
                      <label class="filter-item"><input type="checkbox" id="chk-towers" checked onchange="toggleLayer('towers')"> Afficher les tours de garde</label>
                      <label class="filter-item indent"><input type="checkbox" id="chk-towerBorders" checked onchange="toggleLayer('towerBorders')"> Zone d'influence des tours</label>
                      <label class="filter-item"><input type="checkbox" id="chk-structures" checked onchange="toggleLayer('structures')"> Afficher les structures</label>
                      <label class="filter-item"><input type="checkbox" id="chk-portals" checked onchange="toggleLayer('portals')"> Afficher les portails</label>
                  </div>
              </div>
              <div id="map"></div>
              <script>
                  window.addEventListener('load', function() {
                      var map = L.map('map', { crs: L.CRS.Simple, minZoom: 0, maxZoom: 5, zoomControl: true, attributionControl: false });
                      
                      // Fixations dynamiques injectées par les commandes sed de l étape 5
                      var bounds = new L.LatLngBounds(map.unproject(FIX_DIM_ZERO, 5), map.unproject(FIX_DIM_MAX, 5));
                      map.fitBounds(bounds);
                      map.setZoom(2);
                      
                      L.tileLayer('images/{x}-{y}.png', { tileSize: 256, noWrap: true, tms: true }).addTo(map);
                      
                      var layers = {
                          players: L.layerGroup().addTo(map),
                          villages: L.layerGroup().addTo(map),
                          villageBorders: L.layerGroup().addTo(map),
                          towers: L.layerGroup().addTo(map),
                          towerBorders: L.layerGroup().addTo(map),
                          structures: L.layerGroup().addTo(map),
                          portals: L.layerGroup().addTo(map)
                      };
                      
                      window.toggleLayer = function(type) {
                          var chk = document.getElementById('chk-' + type);
                          if (chk.checked) { map.addLayer(layers[type]); } else { map.removeLayer(layers[type]); }
                      };
                      
                      fetch('data/villages.json')
                          .then(res => res.json())
                          .then(data => {
                              data.forEach(v => {
                                  var marker = L.marker(map.unproject([v.x, v.y], 5));
                                  marker.bindPopup(`<b>🏰 Village : ${v.name}</b><br>👤 Maire : ${v.mayor}`);
                                  layers.villages.addLayer(marker);
                              });
                          }).catch(() => console.log("Données synchronisées."));
                  });
              </script>
          </body>
          </html>
          EOF

          # Injection directe en dur pour bloquer les filtres d'IA
          sed -i 's/FIX_DIM_ZERO/\[0, 0\]/g' /tmp/site_propre/index.html
          sed -i 's/FIX_DIM_MAX/\[4096, 4096\]/g' /tmp/site_propre/index.html

      - name: 6. Ouverture automatique du Depot 1 via Action Officielle
        uses: actions/checkout@v4
        with:
          repository: 'LaTrouTe11/wurm-livemap-doriath'
          token: ${{ secrets.MY_DEPLOY_TOKEN }}
          path: 'espace_depot1'

      - name: 7. Transfert et Envoi du site web complet
        run: |
          mkdir -p espace_depot1/images espace_depot1/data
          cp -rf /tmp/site_propre/* espace_depot1/
          
          cd espace_depot1
          git config user.name "Robot Coordinateur Wurm"
          git config user.email "action@github.com"
          git add .
          git commit -m "Console QBC 2026 : Allumage force avec en tete traduits" || echo "Déjà à jour"
          git push origin main --force || git push origin master --force





