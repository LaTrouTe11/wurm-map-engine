name: Generateur et Liaison Inter-Depots

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du Depot 2 (Générateur)
        uses: actions/checkout@v4

      - name: 2. Installation des paquets requis et des Polices
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openjdk-17-jre fontconfig

      - name: 3. Telechargement des donnees Legion Hosting
        run: |
          mkdir -p ./sqlite
          lftp -c "set sftp:auto-confirm yes; \
                   set ssl:verify-certificate no; \
                   set xfer:clobber on; \
                   open sftp://${{ secrets.LEGION_USER }}:${{ secrets.LEGION_PASS }}@${{ secrets.LEGION_HOST }}:${{ secrets.LEGION_PORT }}; \
                   cd /dist/Doriath-4k-20/sqlite/; \
                   mget -O ./sqlite/ wurmzones.db wurmitems.db wurmplayers.db; \
                   cd ../; \
                   get -O . top_layer.map; \
                   bye"

      - name: 4. Extraction et Preparation de l Arborescence d Origine
        run: |
          # 1. Écriture de la configurationproperties
          cat << 'EOF' > WurmMapGen.properties
          serverName=[QC/FR/CAN] QBC Doriath
          wurmMapLocation=.
          saveLocation=./output_tiles
          dbDir=./sqlite
          zonesDb=wurmzones.db
          itemsDb=wurmitems.db
          playersDb=wurmplayers.db
          actualMapSize=4096
          mapTileSize=256
          mapMaxZoom=5
          mapMinZoom=0
          nativeZoom=5
          markerType=2
          enableRealtimeMarkers=true
          usePHP=false
          rmiHost=${{ secrets.LEGION_HOST }}
          rmiPort=5606
          rmiPassword=${{ secrets.RMI_PASSWORD }}
          EOF

          # 2. Récupération des composants d'interface orignaux absents
          git clone https://github.com /tmp/source_web
          mkdir -p template
          cp -rf /tmp/source_web/app /tmp/source_web/css /tmp/source_web/markers /tmp/source_web/dist /tmp/source_web/includes template/ 2>/dev/null || true
          cp -f /tmp/source_web/index.html template/ 2>/dev/null || true
          rm -rf /tmp/source_web

          # 3. Alignement des structures de dossiers requises
          mkdir -p output_tiles/images output_tiles/data
          mkdir -p template/app template/css template/data template/images template/markers template/dist template/includes
          
          # 4. Lancement sécurisé du générateur Java
          chmod +x WurmMapGen.jar
          java -Djava.awt.headless=true -jar WurmMapGen.jar

      - name: 5. Assemblage du Site Complet Original Stabilisé
        run: |
          mkdir -p /tmp/site_complet
          
          # 1. Copie miroir de toute la structure d'origine reconstruite
          if [ -d "template" ]; then
            cp -rf template/* /tmp/site_complet/
          fi
          
          # 2. Rapatriement forcé des dalles PNG et JSON générées par l'outil
          mkdir -p /tmp/site_complet/images /tmp/site_complet/data
          if [ -d "output_tiles/images/5" ]; then cp -rf output_tiles/images/5/*.png /tmp/site_complet/images/ 2>/dev/null || true; fi
          if [ -d "output_tiles/images" ]; then cp -rf output_tiles/images/*.png /tmp/site_complet/images/ 2>/dev/null || true; fi
          if [ -d "output_tiles/data" ]; then cp -rf output_tiles/data/*.json /tmp/site_complet/data/ 2>/dev/null || true; fi
          cp -f *.png /tmp/site_complet/images/ 2>/dev/null || true
          cp -f *.json /tmp/site_complet/data/ 2>/dev/null || true

          # 3. FIX DE SÉCURITÉ DE LA LIGNE 68 : Écriture forcée du fichier JSON attendu par main.js
          cat << 'EOF' > /tmp/site_complet/data/config.json
          {
            "serverName": "[QC/FR/CAN] QBC Doriath",
            "actualMapSize": 4096,
            "mapTileSize": 256,
            "mapMaxZoom": 5,
            "mapMinZoom": 0,
            "nativeZoom": 5,
            "markerType": 2,
            "enableRealtimeMarkers": true,
            "showPlayers": true,
            "showDeeds": true,
            "showGuardTowers": true,
            "showPortals": true,
            "showStructures": true
          }
          EOF

          # 4. Correction textuelle des balises de Leaflet pour éviter l'écran noir
          if [ -f "/tmp/site_complet/index.html" ]; then
            sed -i 's/map.unproject(\[,\s*\]/map.unproject(\[0,0\]/g' /tmp/site_complet/index.html 2>/dev/null || true
            sed -i 's/{{serverName}}/[QC\/FR\/CAN] QBC Doriath/g' /tmp/site_complet/index.html 2>/dev/null || true
            sed -i 's/Show deeds/Afficher les villages/g' /tmp/site_complet/index.html 2>/dev/null || true
            sed -i 's/Show guard towers/Afficher les tours de garde/g' /tmp/site_complet/index.html 2>/dev/null || true
            sed -i 's/Show players/Afficher les joueurs/g' /tmp/site_complet/index.html 2>/dev/null || true
          fi

      - name: 6. Ouverture automatique du Depot 1 via Action Officielle
        uses: actions/checkout@v4
        with:
          repository: 'LaTrouTe11/wurm-livemap-doriath'
          token: ${{ secrets.MY_DEPLOY_TOKEN }}
          path: 'espace_depot1'

      - name: 7. Deploiement de la Structure Miroir Absolue vers Depot 1
        run: |
          mkdir -p espace_depot1/images espace_depot1/data espace_depot1/app espace_depot1/css espace_depot1/markers espace_depot1/dist espace_depot1/includes
          
          # Transfert miroir complet
          cp -rf /tmp/site_complet/* espace_depot1/
          
          cd espace_depot1
          git config user.name "Robot Coordinateur Wurm"
          git config user.email "action@github.com"
          git add -A .
          git commit -m "Console QBC 2026 : Integration totale et resolution de l erreur de ligne 68" || echo "Déjà à jour"
          git push origin main --force || git push origin master --force








