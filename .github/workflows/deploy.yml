name: Deploy Wurm Map

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4

      - name: Download Data via FTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          # Utilisation de mget et timeout pour éviter le blocage
          lftp -c "set ftp:ssl-allow no; set net:timeout 10; set net:max-retries 1; open -u ${{ secrets.LEGION_USER }},${{ secrets.LEGION_PASS }} -p ${{ secrets.LEGION_PORT }} ${{ secrets.LEGION_HOST }}; mget wurmplayers.db wurm.db; quit"

      - name: Generate Map
        run: |
          java -jar WurmMapGen.jar

      - name: Clone Site Web
        run: |
          git clone https://x-access-token:${{ secrets.MY_DEPLOY_TOKEN }}@github.com/LaTrouTe11/wurm-livemap-doriath.git

      - name: Copy Maps to Site
        run: |
          # On copie le contenu généré vers le dossier du site cloné
          # Assurez-vous que le dossier 'tiles' existe bien après l'étape Generate Map
          cp -r tiles/* wurm-livemap-doriath/tiles/

      - name: Push to Site Web
        run: |
          cd wurm-livemap-doriath
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Mise à jour automatique de la carte"
          git push https://x-access-token:${{ secrets.MY_DEPLOY_TOKEN }}@github.com/LaTrouTe11/wurm-livemap-doriath.git main
